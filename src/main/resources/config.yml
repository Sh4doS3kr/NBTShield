# ======================================================
# NBTShield Configuration v2.0
# Comprehensive protection against all NBT/packet exploits and chunk banning
# ======================================================

# ---- General NBT Size Limits ----

# Maximum allowed NBT data size in bytes for a single item stack
# Default: 262144 (256KB) - Protocol max is 8388608 (8MB)
max-item-nbt-bytes: 262144

# Maximum allowed total NBT size for a shulker box (including contents)
# Default: 500000 (500KB)
max-shulker-nbt-bytes: 500000

# Maximum allowed total NBT size for any container block (chests, barrels, hoppers, etc.)
# Default: 500000 (500KB)
max-container-nbt-bytes: 500000

# Skip items with CustomModelData from ALL size checks and removal.
# Items with CustomModelData are server-created (resource pack textures)
# and should NEVER be deleted. Set to false only if you don't use a resource pack.
skip-custom-model-data-items: true

# ---- Book Protection ----
# Prevents "Tried to read NBT tag that was too big" and payload exploits

# Enable book exploit protection
book-protection: true

# Maximum number of pages allowed in a book
max-book-pages: 100

# Maximum characters per page
max-book-page-length: 320

# Maximum total book size in bytes (serialized)
# Default: 32000 (vanilla payload limit is 32767)
max-book-bytes: 32000

# ---- Sign Protection ----
# Prevents oversized sign data exploits

sign-protection: true

# Maximum characters per sign line
max-sign-line-length: 384

# ---- Entity Protection ----
# Prevents NBT exploits via item frames, armor stands, etc.

entity-protection: true

# Scan entities in chunks on load (item frames, armor stands, etc.)
scan-entity-nbt-on-chunk-load: true

# ---- Packet / Network Protection ----
# Prevents: PacketTooLarge, VarInt too big, VarLong too big,
# badly compressed packets, connection timeouts, etc.

# Enable Netty pipeline injection for packet-level protection
packet-protection: true

# Maximum allowed outbound packet size in bytes before it gets dropped
# Default: 8000000 (just under the 8388608 protocol limit)
max-outbound-packet-bytes: 8000000

# Maximum allowed inbound packet size in bytes
# Default: 2000000 (just under the 2097152 NBT read limit)
max-inbound-packet-bytes: 2000000

# Maximum allowed custom payload (plugin channel) size
# Default: 1000000 (under the 1048576 limit)
max-payload-bytes: 1000000

# Kick players sending malformed packets (VarInt/VarLong exploits)
kick-on-malformed-packet: true

# ---- Command / OP Exploit Protection ----
# Prevents: ClickEvent command injection in books, items, signs, lecterns
# Detects: /op, /deop, /stop, /ban, /lp, /pex, run_command JSON, and more

# Enable command exploit scanning (books, items, lore, names)
command-exploit-protection: true

# Block command block placement for non-authorized players
# Requires permission: nbtshield.commandblock
command-block-protection: true

# Kick players who attempt OP/permission exploits
kick-on-op-exploit: true

# Kick message for OP exploit attempts
op-exploit-kick-message: "&c&l[NBTShield] &eYou have been kicked for attempting a command exploit."

# ---- Chunk NBT Limit ----
# Prevents accumulation of many small items (e.g. books) that together exceed the chunk packet limit
# The Minecraft chunk packet limit is ~2MB (2,097,152 bytes)

# Enable total chunk NBT size enforcement
chunk-nbt-limit: true

# Maximum total NBT data in a single chunk (all containers + entities combined)
# Default: 1500000 (1.5MB) - safely under the 2MB protocol limit
max-chunk-nbt-bytes: 1500000

# Maximum number of books allowed in a single container (shulker, chest, etc.)
# Prevents filling containers with many small but valid books to accumulate data
# Default: 9 (enough for normal use, but prevents book-stuffing)
max-books-per-container: 9

# ---- Unicode / Resource Pack Character Protection ----
# Prevents players from using Private Use Area (PUA) Unicode characters
# These are characters used by resource packs for custom textures/fonts
# Players should NOT be able to type or use these in chat, items, signs, books, etc.

# Enable Unicode/PUA character protection
unicode-protection: true

# KICK INSTANTLY when a player uses PUA/texture characters
kick-on-unicode-abuse: true

# Kick message for unicode abuse
unicode-kick-message: "&c&l[NBTShield] &eYou have been kicked for using resource pack characters."

# ---- Scanning ----

# Periodic inventory scan for ALL online players (catches externally-imported items)
# This is critical to prevent items brought from singleplayer worlds, NBT editors, or hacked clients
periodic-scan: true

# Interval in seconds between periodic scans (lower = more secure, higher = less CPU)
# Default: 30 seconds
periodic-scan-interval-seconds: 30

# Scan chunks on load for oversized tile entities
scan-chunks-on-load: true

# Scan player inventory on join
scan-on-join: true

# Scan player inventory on any inventory interaction
scan-on-inventory-click: true

# Remove oversized items as dropped entities
scan-dropped-items: true

# Scan creative mode inventory actions
scan-creative-actions: true

# ---- Logging & Notifications ----

# Log removals to console
log-removals: true

# Notify admins when an oversized item is detected
notify-admins: true

# Message sent to the player when an illegal item is removed
player-message: "&c&l[NBTShield] &eAn illegal oversized item was removed from your inventory."

# Message sent to admins
admin-message: "&c&l[NBTShield] &eRemoved oversized item from &6{player} &e(Size: &c{size}&e bytes)"

# ---- Strike System ----
# If a player triggers more than X times in Y seconds, clear ALL illegal items

strike-threshold: 3
strike-window-seconds: 60
strike-action-message: "&c&l[NBTShield] &eAll shulker boxes and illegal items have been removed from your inventory due to repeated violations."
